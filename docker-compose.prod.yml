version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: birthdayhub_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - birthdayhub_network

  redis:
    image: redis:7-alpine
    container_name: birthdayhub_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    networks:
      - birthdayhub_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: birthdayhub_backend_prod
    restart: always
    depends_on:
      - postgres
      - redis
    env_file:
      - ./backend/.env.production
    networks:
      - birthdayhub_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: birthdayhub_frontend_prod
    restart: always
    depends_on:
      - backend
    networks:
      - birthdayhub_network

  nginx:
    image: nginx:alpine
    container_name: birthdayhub_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - birthdayhub_network

volumes:
  postgres_prod_data:
  redis_prod_data:

networks:
  birthdayhub_network:
    driver: bridge
